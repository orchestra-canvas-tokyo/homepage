<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<title>お問い合わせを承りました</title>
	</head>
	<body
		style="
			margin: 0;
			padding: 0;
			background-color: #f7f3f1;
			color: #221c1a;
			font-family: 'Yu Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
		"
	>
		<div style="max-width: 640px; margin: 0 auto; padding: 32px 24px">
			<div
				style="
					padding: 32px 24px;
					background-color: #ffffff;
					border: 1px solid #d6ccc7;
					border-radius: 16px;
					line-height: 1.9;
				"
			>
				%recipientLine%
				<p style="margin: 0 0 16px">
					Orchestra Canvas Tokyoです。<br />ホームページより、お問い合わせを承りました。
				</p>
				<p style="margin: 0 0 24px">
					必要に応じてメールにてご返答いたします。<br />
					なお、メールアドレスが正しく入力されていない場合、返答いたしかねます。ご了承ください。
				</p>
				<hr style="border: none; border-top: 1px solid #d6ccc7; margin: 24px 0" />
				<p style="margin: 0 0 8px"><strong>分類</strong></p>
				<p style="margin: 0 0 20px">%categoryDescription%</p>
				<p style="margin: 0 0 8px"><strong>本文</strong></p>
				<p style="margin: 0">%body%</p>
			</div>
		</div>
	</body>
</html>
